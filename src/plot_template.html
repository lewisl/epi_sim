<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{TITLE}}</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
  <div id="plot" style="width:900px;height:600px;"></div>
  <h2>{{HEADING}}</h2>
  <script id="plot-payload" type="application/json">{{PAYLOAD_JSON}}</script>
  <script>
    let payload;
    try {
      payload = JSON.parse(document.getElementById("plot-payload").textContent);
    } catch {
      payload = {
        data: [],
        layout: { title: "Plot Template" }
      };
    }

    Plotly.newPlot("plot", payload.data, payload.layout);
  </script>
</body>
</html>
