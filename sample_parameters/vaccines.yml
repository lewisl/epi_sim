
Pfizer:  # will convert to symbol at load time
  halflife:         360
  reqdshots:          2
  delay2ndshot:      21
  delaybooster:     160
  full_effect_days:  14
  day1_effect:      0.65


  # reduce vaccine immunity effectiveness for infection risk
  #     compared to effectiveness for reducing severity
  # for variant being received by vaccinated person
  # multiply times effectiveness
  infectfactor:    
    base:     0.9
    alpha:    0.9
    delta:    0.85
    omicron_ba1:  0.75
    omicron_ba2: 0.75
    omicron_ba4_5: 0.75

  # effectiveness in reducing severity of illness 
  # shots: first, full, booster
  # we need data for each known variant
  # variants are the attacker variant
  effectiveness:
    first:
      base:     0.90
      alpha:    0.90
      delta:    0.70
      omicron_ba1:  0.65
      omicron_ba2:  0.65
      omicron_ba4_5: 0.65
    full:
      base:     0.94
      alpha:    0.94
      delta:    0.80
      omicron_ba1:  0.85
      omicron_ba2: 0.85
      omicron_ba4_5: 0.85
    booster:
      base:     0.94
      alpha:    0.94
      delta:    0.80
      omicron_ba1:  0.85
      omicron_ba2: 0.85
      omicron_ba4_5: 0.85

